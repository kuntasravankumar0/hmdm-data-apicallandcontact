<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Data Dashboard - Headwind MDM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-bottom: 1px solid #2a2a4a;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .subtitle { font-size: 13px; color: #888; margin-top: 2px; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        
        /* Stats Cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s ease;
        }
        .stat-card:hover { border-color: #4a4a6a; transform: translateY(-1px); }
        .stat-card .label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 6px; }
        .stat-card .value { font-size: 32px; font-weight: 700; color: #fff; }
        .stat-card .value.blue { color: #60a5fa; }
        .stat-card .value.green { color: #34d399; }
        .stat-card .value.purple { color: #a78bfa; }
        .stat-card .value.orange { color: #fb923c; }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: #888;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .tab:hover { color: #ccc; background: rgba(255,255,255,0.05); }
        .tab.active {
            background: linear-gradient(135deg, #3b82f6, #7c3aed);
            color: #fff;
        }
        
        /* Content area */
        .content-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .toolbar {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .search-box {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-box input, .search-box select {
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 8px 14px;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            min-width: 160px;
        }
        .search-box input:focus, .search-box select:focus { border-color: #3b82f6; }
        .search-box input::placeholder { color: #555; }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #7c3aed); color: #fff; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-danger { background: #dc2626; color: #fff; }
        .btn-danger:hover { opacity: 0.9; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        
        /* Table */
        .table-wrap { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 12px 16px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            background: #0f0f1a;
            border-bottom: 1px solid #2a2a4a;
            font-weight: 600;
            white-space: nowrap;
        }
        td {
            padding: 12px 16px;
            font-size: 14px;
            border-bottom: 1px solid #1e1e38;
            color: #ccc;
        }
        tr:hover td { background: rgba(59,130,246,0.05); }
        
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-incoming { background: rgba(52,211,153,0.15); color: #34d399; }
        .badge-outgoing { background: rgba(96,165,250,0.15); color: #60a5fa; }
        .badge-missed { background: rgba(239,68,68,0.15); color: #ef4444; }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 18px; color: #888; margin-bottom: 8px; }
        .empty-state p { font-size: 14px; }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px;
        }
        .pagination .page-btn {
            padding: 6px 12px;
            border: 1px solid #2a2a4a;
            background: transparent;
            color: #888;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
        }
        .pagination .page-btn:hover { border-color: #3b82f6; color: #fff; }
        .pagination .page-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
        
        .time { font-size: 12px; color: #666; white-space: nowrap; }
        .device-tag {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(96,165,250,0.1);
            border-radius: 4px;
            font-size: 12px;
            color: #60a5fa;
            font-family: monospace;
        }

        .refresh-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #888;
        }
        .refresh-indicator.spinning {
            color: #60a5fa;
        }

        .loading-overlay {
            display: none;
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .loading-overlay.active { display: block; }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #2a2a4a;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .toolbar { flex-direction: column; }
            .search-box { width: 100%; }
            .search-box input { flex: 1; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>📱 Device Data Dashboard</h1>
            <div class="subtitle">View contacts, call logs &amp; notifications synced from Android devices</div>
        </div>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="refreshAll()">🔄 Refresh</button>
            <span class="refresh-indicator" id="refreshIndicator">Auto-refresh every 30s</span>
        </div>
    </div>
    
    <div class="container">
        <!-- Stats -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card"><div class="label">Total Contacts</div><div class="value blue" id="statContacts">-</div></div>
            <div class="stat-card"><div class="label">Call Logs</div><div class="value green" id="statCallLogs">-</div></div>
            <div class="stat-card"><div class="label">Notifications</div><div class="value purple" id="statNotifications">-</div></div>
            <div class="stat-card"><div class="label">Registered Devices</div><div class="value orange" id="statDevices">-</div></div>
        </div>
        
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('contacts', this)">📇 Contacts</button>
            <button class="tab" onclick="switchTab('calllogs', this)">📞 Call Logs</button>
            <button class="tab" onclick="switchTab('notifications', this)">🔔 Notifications</button>
        </div>
        
        <!-- Content -->
        <div class="content-card">
            <div class="toolbar" id="toolbar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search..." onkeyup="debounceSearch()">
                    <select id="deviceFilter" onchange="loadData()">
                        <option value="">All Devices</option>
                    </select>
                    <select id="typeFilter" style="display:none;" onchange="loadData()">
                        <option value="">All Types</option>
                        <option value="INCOMING">Incoming</option>
                        <option value="OUTGOING">Outgoing</option>
                        <option value="MISSED">Missed</option>
                    </select>
                </div>
                <div>
                    <span style="font-size:13px;color:#888;" id="totalCount"></span>
                </div>
            </div>
            <div class="table-wrap" id="tableContainer">
                <div class="empty-state" id="emptyState">
                    <div class="icon">📊</div>
                    <h3>No Data Yet</h3>
                    <p>Data will appear here once devices sync contacts, call logs, or notifications.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'contacts';
        let currentPage = 0;
        const pageSize = 50;
        let searchTimeout;
        
        async function fetchJSON(url, options = {}) {
            const res = await fetch(url, options);
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        async function loadSummary() {
            try {
                const data = await fetchJSON('/api/summary');
                document.getElementById('statContacts').textContent = data.counts.contacts.toLocaleString();
                document.getElementById('statCallLogs').textContent = data.counts.callLogs.toLocaleString();
                document.getElementById('statNotifications').textContent = data.counts.notifications.toLocaleString();
                document.getElementById('statDevices').textContent = data.counts.devices;
                
                // Update device filter
                const sel = document.getElementById('deviceFilter');
                // Keep existing selections
                const currVal = sel.value;
                // Fetch unique devices from API - we'll update during data load
            } catch (e) {
                console.error('Summary error:', e);
            }
        }

        async function loadData() {
            const search = document.getElementById('searchInput').value.trim();
            const deviceId = document.getElementById('deviceFilter').value;
            const callType = document.getElementById('typeFilter').value;
            
            let url;
            let showTypeFilter = false;
            
            switch(currentTab) {
                case 'contacts':
                    url = `/api/contacts?limit=${pageSize}&offset=${currentPage * pageSize}`;
                    if (search) url += `&search=${encodeURIComponent(search)}`;
                    if (deviceId) url += `&deviceId=${encodeURIComponent(deviceId)}`;
                    document.getElementById('typeFilter').style.display = 'none';
                    break;
                case 'calllogs':
                    url = `/api/calllogs?limit=${pageSize}&offset=${currentPage * pageSize}`;
                    if (deviceId) url += `&deviceId=${encodeURIComponent(deviceId)}`;
                    if (callType) url += `&type=${encodeURIComponent(callType)}`;
                    showTypeFilter = true;
                    document.getElementById('typeFilter').style.display = 'inline-block';
                    break;
                case 'notifications':
                    url = `/api/notifications?limit=${pageSize}&offset=${currentPage * pageSize}`;
                    if (deviceId) url += `&deviceId=${encodeURIComponent(deviceId)}`;
                    if (search) url += `&app=${encodeURIComponent(search)}`;
                    document.getElementById('typeFilter').style.display = 'none';
                    break;
            }

            try {
                const data = await fetchJSON(url);
                renderTable(data);
                document.getElementById('totalCount').textContent = `Showing ${data.data.length} of ${data.total} records`;
                
                // Update device filter options
                const devices = [...new Set(data.data.map(d => d.device_id).filter(Boolean))];
                const sel = document.getElementById('deviceFilter');
                const currVal = sel.value;
                sel.innerHTML = '<option value="">All Devices</option>';
                for (const dev of [...new Set([...devices])]) {
                    const opt = document.createElement('option');
                    opt.value = dev;
                    opt.textContent = dev;
                    sel.appendChild(opt);
                }
                sel.value = currVal;
            } catch (e) {
                console.error('Load error:', e);
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('emptyState').innerHTML = `<div class="icon">⚠️</div><h3>Error Loading Data</h3><p>${e.message}</p>`;
            }
        }

        function renderTable(data) {
            const container = document.getElementById('tableContainer');
            
            if (!data.data || data.data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <h3>No Records Found</h3>
                        <p>No data matching your criteria.</p>
                    </div>`;
                return;
            }

            let html = '<table><thead><tr>';
            
            switch(currentTab) {
                case 'contacts':
                    html += '<th>Device</th><th>Name</th><th>Phone</th><th>Type</th><th>Email</th><th>Updated</th>';
                    html += '</tr></thead><tbody>';
                    for (const c of data.data) {
                        html += `<tr>
                            <td><span class="device-tag">${esc(c.device_id)}</span></td>
                            <td><strong>${esc(c.name)}</strong></td>
                            <td>${esc(c.phone)}</td>
                            <td><span style="color:#888;font-size:12px;">${esc(c.phone_type)}</span></td>
                            <td style="color:#888;">${esc(c.email)}</td>
                            <td><span class="time">${formatTime(c.synced_at)}</span></td>
                        </tr>`;
                    }
                    break;
                    
                case 'calllogs':
                    html += '<th>Device</th><th>Phone</th><th>Type</th><th>Duration</th><th>Contact</th><th>Date</th>';
                    html += '</tr></thead><tbody>';
                    for (const l of data.data) {
                        const typeClass = `badge-${l.call_type?.toLowerCase() || 'unknown'}`;
                        html += `<tr>
                            <td><span class="device-tag">${esc(l.device_id)}</span></td>
                            <td>${esc(l.phone_number)}</td>
                            <td><span class="badge ${typeClass}">${esc(l.call_type || 'UNKNOWN')}</span></td>
                            <td>${formatDuration(l.duration_sec)}</td>
                            <td style="color:#888;">${esc(l.contact_name)}</td>
                            <td><span class="time">${formatTime(l.call_date)}</span></td>
                        </tr>`;
                    }
                    break;
                    
                case 'notifications':
                    html += '<th>Device</th><th>App</th><th>Title</th><th>Text</th><th>Received</th>';
                    html += '</tr></thead><tbody>';
                    for (const n of data.data) {
                        html += `<tr>
                            <td><span class="device-tag">${esc(n.device_id)}</span></td>
                            <td style="color:#888;font-size:12px;">${esc(n.app_name || n.package_name)}</td>
                            <td><strong>${esc(n.title)}</strong></td>
                            <td style="color:#888;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(n.text_body)}</td>
                            <td><span class="time">${formatTime(n.received_at)}</span></td>
                        </tr>`;
                    }
                    break;
            }
            
            html += '</tbody></table>';
            
            // Pagination
            const totalPages = Math.ceil(data.total / data.limit);
            if (totalPages > 1) {
                html += `<div class="pagination">`;
                for (let i = 0; i < totalPages && i < 10; i++) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i + 1}</button>`;
                }
                html += `</div>`;
            }
            
            container.innerHTML = html;
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            currentTab = tab;
            currentPage = 0;
            
            // Update search placeholder
            const searchInput = document.getElementById('searchInput');
            if (tab === 'notifications') {
                searchInput.placeholder = 'Search by app name...';
            } else if (tab === 'contacts') {
                searchInput.placeholder = 'Search name, phone or email...';
            } else {
                searchInput.placeholder = 'Type device ID...';
            }
            
            document.getElementById('searchInput').value = '';
            loadData();
        }

        function goToPage(page) {
            currentPage = page;
            loadData();
        }

        function formatDuration(secs) {
            if (!secs && secs !== 0) return '-';
            if (secs < 60) return `${secs}s`;
            const m = Math.floor(secs / 60);
            const s = secs % 60;
            return `${m}m ${s}s`;
        }

        function formatTime(ts) {
            if (!ts) return '-';
            const d = new Date(parseInt(ts) > 9999999999 ? parseInt(ts) : parseInt(ts) * 1000);
            if (isNaN(d.getTime())) return '-';
            return d.toLocaleString();
        }

        function esc(s) {
            if (!s) return '';
            const div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(loadData, 400);
        }

        async function refreshAll() {
            const indicator = document.getElementById('refreshIndicator');
            indicator.textContent = '🔄 Refreshing...';
            indicator.classList.add('spinning');
            await Promise.all([loadSummary(), loadData()]);
            indicator.textContent = '✅ Updated';
            setTimeout(() => {
                indicator.textContent = 'Auto-refresh every 30s';
                indicator.classList.remove('spinning');
            }, 2000);
        }

        // Auto-refresh
        let autoRefresh;
        function startAutoRefresh() {
            autoRefresh = setInterval(loadSummary, 30000);
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadSummary();
            loadData();
            startAutoRefresh();
        });
    </script>
</body>
</html>
